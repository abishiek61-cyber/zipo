version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: zipo_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: zipo123
      MYSQL_DATABASE: zipo
      MYSQL_USER: zipouser
      MYSQL_PASSWORD: zipopass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
volumes:
  mysql_data:
